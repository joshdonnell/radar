name: formats

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    name: Formats

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
        with:
          php-version: 8.3
          tools: composer:v2
          coverage: none

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@9446e853b27985e00fb1b21193be026fc09198db # v1
        with:
          node-version: 24

      - name: Install Node Dependencies
        run: npm ci

      - name: Cache Composer Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-8.3-prefer-stable-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.3-
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Build Assets
        run: npm run build

      - name: Node Lint Checks
        run: npm run test:lint

      - name: Node Type Checks
        run: npm run test:types

      - name: Cache PHPStan
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-8.3-

      - name: Create Cache Directories
        run: mkdir -p /tmp/phpstan /tmp/rector

      - name: PHP Lint Checks
        run: composer test:lint

      - name: PHP Type Checks
        run: composer test:types

      - name: PHP Type Coverage Checks
        run: composer test:type-coverage

      - name: PHP Refactor Checks
        run: composer test:refactor
