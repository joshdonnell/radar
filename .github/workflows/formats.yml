name: formats

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    name: Formats

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          tools: composer:v2
          coverage: none

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1
        with:
          node-version: 24

      - name: Install Node Dependencies
        run: npm ci

      - name: Cache Composer Dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-8.3-prefer-stable-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-8.3-
            ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Build Assets
        run: npm run build

      - name: Node Lint Checks
        run: npm run test:lint

      - name: Node Type Checks
        run: npm run test:types

      - name: Cache PHPStan
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-8.3-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-phpstan-8.3-

      - name: Create Cache Directories
        run: mkdir -p /tmp/phpstan /tmp/rector

      - name: PHP Lint Checks
        run: composer test:lint

      - name: PHP Type Checks
        run: composer test:types

      - name: PHP Type Coverage Checks
        run: composer test:type-coverage

      - name: PHP Refactor Checks
        run: composer test:refactor
